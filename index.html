<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PDF Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            margin: 0;
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .upload-section {
            border: 2px dashed var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-section:hover, .upload-section.dragover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-section input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 1rem;
            transition: transform 0.2s, background 0.2s;
            pointer-events: none;
        }

        .upload-section:hover .upload-btn {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .chat-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chat-history {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            height: 300px;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border: 1px solid var(--glass-border);
        }

        .message {
            max-width: 80%;
            padding: 1rem;
            border-radius: 12px;
            line-height: 1.5;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            display: flex;
            gap: 1rem;
        }

        input[type="text"] {
            flex: 1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button.send-btn {
            background: linear-gradient(to right, #60a5fa, #8b5cf6);
            border: none;
            padding: 0 2rem;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
        }

        button.send-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .loader {
            display: none;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #60a5fa;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="container">
        <h1>AI PDF Assistant</h1>
        
        <div class="upload-section" id="upload-zone">
            <input type="file" id="pdf-upload" accept="application/pdf">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-muted);"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
            <p style="color: var(--text-muted); margin-top: 1rem;">Drag & drop your PDF here or click to browse</p>
            <div class="upload-btn">Select PDF</div>
            <div id="upload-status" style="margin-top: 10px; font-size: 0.9rem;"></div>
            <div class="loader" id="upload-loader"></div>
        </div>

        <div class="chat-section">
            <div class="chat-history" id="chat-history">
                <div class="message bot">Hello! Upload a PDF above, and then ask me any questions about it.</div>
            </div>
            
            <div class="input-area">
                <input type="text" id="query-input" placeholder="Ask a question about the document..." onkeypress="handleEnter(event)">
                <button class="send-btn" onclick="sendQuery()">Ask</button>
            </div>
        </div>
    </div>

    <script>
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('pdf-upload');
        const statusDiv = document.getElementById('upload-status');
        const loader = document.getElementById('upload-loader');
        const chatHistory = document.getElementById('chat-history');
        const queryInput = document.getElementById('query-input');

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusDiv.style.color = 'var(--text-main)';
            statusDiv.innerText = `Uploading ${file.name}...`;
            loader.style.display = 'block';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if(response.ok) {
                    statusDiv.style.color = '#4ade80';
                    statusDiv.innerText = `Success! ${file.name} is ready for questions.`;
                } else {
                    statusDiv.style.color = '#f87171';
                    statusDiv.innerText = `Error: ${data.detail || 'Upload failed'}`;
                }
            } catch (error) {
                statusDiv.style.color = '#f87171';
                statusDiv.innerText = 'Network error during upload.';
            } finally {
                loader.style.display = 'none';
            }
        });

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerText = text;
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendQuery();
        }

        async function sendQuery() {
            const text = queryInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            queryInput.value = '';

            const botMsgId = 'msg-' + Date.now();
            const botMsgDiv = document.createElement('div');
            botMsgDiv.className = 'message bot';
            botMsgDiv.id = botMsgId;
            botMsgDiv.innerHTML = '<div class="loader" style="display:block; width:16px; height:16px; border-width:2px; margin:0"></div>';
            chatHistory.appendChild(botMsgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: text })
                });
                const data = await response.json();
                
                const el = document.getElementById(botMsgId);
                if(response.ok) {
                    el.innerText = data.answer;
                } else {
                    el.innerText = `Error: ${data.detail || 'Could not fetch answer'}`;
                    el.style.color = '#f87171';
                }
            } catch (error) {
                const el = document.getElementById(botMsgId);
                el.innerText = 'Network error during query.';
                el.style.color = '#f87171';
            }
        }
    </script>
</body>
</html>
