services:
  - type: web
    name: pdf-rag-app
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: GROQ_API_KEY
        sync: false
      - key: QDRANT_URL
        value: https://your-qdrant-cluster.qdrant.io
        sync: false
      - key: QDRANT_API_KEY
        sync: false
